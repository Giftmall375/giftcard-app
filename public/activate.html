<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activate Gift Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0F1B35; --navy2: #162040; --card-bg: #192545;
      --gold: #D4A843; --white: #F8F6F0; --steel: #8A95A3;
      --green: #2ECC8A; --red: #E05C5C;
    }
    html, body { min-height: 100vh; background: var(--navy); color: var(--white); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px; }
    .back { position: fixed; top: 24px; left: 24px; display: inline-flex; align-items: center; gap: 6px; color: var(--steel); font-size: 13px; font-weight: 500; text-decoration: none; transition: color 0.18s; }
    .back:hover { color: var(--white); }
    header { text-align: center; margin-bottom: 40px; }
    .logo-chip { display: inline-flex; align-items: center; gap: 8px; background: var(--card-bg); border: 1px solid rgba(212,168,67,0.25); border-radius: 999px; padding: 6px 16px 6px 10px; font-size: 13px; font-weight: 600; color: var(--gold); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 20px; }
    header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(28px, 5vw, 42px); line-height: 1.1; }
    header p { color: var(--steel); font-size: 15px; margin-top: 10px; }
    .card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 36px 32px; width: 100%; max-width: 460px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--steel); margin-bottom: 8px; }
    .input-wrap { position: relative; }
    input[type="text"], input[type="email"] { width: 100%; background: var(--navy); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500; letter-spacing: 0.06em; padding: 14px 46px 14px 16px; outline: none; transition: border-color 0.2s; }
    input[type="email"] { letter-spacing: 0.01em; }
    input[type="text"]#holder-name { letter-spacing: 0.01em; }
    input::placeholder { color: rgba(138,149,163,0.5); letter-spacing: 0.02em; }
    input:focus { border-color: var(--gold); }
    .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--steel); pointer-events: none; }
    .two-col { display: flex; gap: 12px; }
    .two-col .field { flex: 1; margin-bottom: 0; }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 24px 0; }
    button.primary-btn { width: 100%; margin-top: 8px; background: var(--gold); color: var(--navy); border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; padding: 15px; cursor: pointer; transition: background 0.18s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    button.primary-btn:hover { background: #e6b94c; }
    button.primary-btn:active { transform: scale(0.98); }
    button.primary-btn:disabled { background: #6e5a28; color: rgba(15,27,53,0.5); cursor: not-allowed; transform: none; }
    .spinner { width: 16px; height: 16px; border: 2.5px solid rgba(15,27,53,0.3); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { display: none; margin-top: 14px; background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--red); text-align: center; }
    .error-msg.visible { display: block; }
    .success-panel { display: none; text-align: center; padding: 12px 0 4px; animation: fadeUp 0.35s ease; }
    .success-panel.visible { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .success-icon { width: 64px; height: 64px; background: rgba(46,204,138,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .success-panel h2 { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 10px; color: var(--green); }
    .success-panel p { color: var(--steel); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
    .success-panel a { display: inline-flex; align-items: center; gap: 6px; background: rgba(46,204,138,0.1); color: var(--green); border: 1px solid rgba(46,204,138,0.25); border-radius: 8px; padding: 11px 20px; font-size: 13px; font-weight: 600; text-decoration: none; transition: background 0.18s; margin: 4px; }
    .success-panel a:hover { background: rgba(46,204,138,0.18); }
    footer { margin-top: 32px; font-size: 12px; color: rgba(138,149,163,0.5); text-align: center; }
    footer a { color: var(--steel); text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color 0.2s; }
    footer a:hover { text-decoration-color: var(--steel); }
    @media (max-width: 400px) { .card { padding: 28px 20px; } .back { top: 16px; left: 16px; } }
  </style>
</head>
<body>

  <a class="back" href="index.html">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back
  </a>

  <header>
    <div class="logo-chip">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v1.5M8 12.5V14M2 8H1M15 8h-1M4.1 4.1 3 3M13 13l-1.1-1.1M4.1 11.9 3 13M13 3l-1.1 1.1" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="8" cy="8" r="3" stroke="#D4A843" stroke-width="1.5"/>
      </svg>
      Activate
    </div>
    <h1>Activate Your Card</h1>
    <p>Enter your card details to get started.</p>
  </header>

  <div class="card" id="form-card">

    <!-- NAME (new) -->
    <div class="field">
      <label for="holder-name">Full Name</label>
      <div class="input-wrap">
        <input id="holder-name" type="text" placeholder="Jane Smith" autocomplete="name" />
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
            <circle cx="8.5" cy="5.5" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2 14c0-3 3-5 6.5-5s6.5 2 6.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="field">
      <label for="card-number">Card Number</label>
      <div class="input-wrap">
        <input id="card-number" type="text" placeholder="XXXX XXXX XXXX XXXX" maxlength="19" autocomplete="off" spellcheck="false" />
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="1" y="4" width="16" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M1 8h16" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="two-col">
      <div class="field">
        <label for="expiry">Expiration Date</label>
        <div class="input-wrap">
          <input id="expiry" type="text" placeholder="MM/YY" maxlength="5" autocomplete="off" />
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="2.5" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M1 6.5h14" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 1v3M11 1v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
        </div>
      </div>
      <div class="field">
        <label for="pin">PIN</label>
        <div class="input-wrap">
          <input id="pin" type="text" placeholder="••••" maxlength="8" autocomplete="off" />
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <div class="field">
      <label for="email">Email Address <span style="color:rgba(138,149,163,0.5);font-weight:400;text-transform:none;letter-spacing:0">(optional — for confirmation)</span></label>
      <div class="input-wrap">
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M1 5l7 5 7-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
      </div>
    </div>

    <button class="primary-btn" id="activate-btn" onclick="activateCard()">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Activate Card</span>
    </button>

    <div class="error-msg" id="error-msg"></div>

    <div class="success-panel" id="success-panel">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M6 14l6 6 10-12" stroke="#2ECC8A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Card Activated!</h2>
      <p>Your gift card is ready to use. You can now check your balance or start shopping.</p>
      <div>
        <a href="giftcard-balance.html">Check Balance <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
        <a href="index.html">Back to Home <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
      </div>
    </div>

  </div>

  <footer>
    Need help? <a href="#">Contact support</a> &nbsp;·&nbsp; <a href="#">Terms of use</a>
  </footer>

  <script>
    document.getElementById('card-number').addEventListener('input', function (e) {
      let v = e.target.value.replace(/\D/g, '').slice(0, 16);
      e.target.value = v.replace(/(.{4})/g, '$1 ').trim();
    });
    document.getElementById('expiry').addEventListener('input', function (e) {
      let v = e.target.value.replace(/\D/g, '').slice(0, 4);
      if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
      e.target.value = v;
    });

    async function activateCard() {
      const name   = document.getElementById('holder-name').value.trim();
      const cardNumber = document.getElementById('card-number').value.trim();
      const expiry = document.getElementById('expiry').value.trim();
      const pin    = document.getElementById('pin').value.trim();
      const email  = document.getElementById('email').value.trim();

      const btn      = document.getElementById('activate-btn');
      const spinner  = document.getElementById('spinner');
      const btnLabel = document.getElementById('btn-label');
      const errorMsg = document.getElementById('error-msg');

      errorMsg.classList.remove('visible');

      if (!name)       { errorMsg.textContent = 'Please enter your full name.'; errorMsg.classList.add('visible'); return; }
      if (!cardNumber) { errorMsg.textContent = 'Please enter your card number.'; errorMsg.classList.add('visible'); return; }
      if (!expiry)     { errorMsg.textContent = 'Please enter the expiration date.'; errorMsg.classList.add('visible'); return; }
      if (!pin)        { errorMsg.textContent = 'Please enter your PIN.'; errorMsg.classList.add('visible'); return; }

      btn.disabled = true;
      spinner.style.display = 'block';
      btnLabel.textContent = 'Activating…';

      try {
        const res = await fetch('/api/cards/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ num: cardNumber, expiry, pin, holder: name, email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong.');

        document.getElementById('form-card').querySelectorAll('.field, hr, button').forEach(el => el.style.display = 'none');
        document.getElementById('success-panel').classList.add('visible');

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('visible');
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnLabel.textContent = 'Activate Card';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') activateCard(); });
  </script>

</body>
</html>
